<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Builder Pro</title>

<style>
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a,#020617);color:white;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
h1{text-align:center;margin-bottom:20px}
.tabs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.tab{padding:10px 16px;border-radius:999px;background:#1e293b;cursor:pointer}
.tab.active{background:#3b82f6}
.panel{display:none}
.panel.active{display:block}
.accordion{margin-bottom:12px;border-radius:12px;background:#1e293b}
.accordion-header{padding:12px;cursor:pointer;font-weight:bold}
.accordion-header:hover{background:#334155}
.accordion-content{display:none;padding:10px}
.accordion.active .accordion-content{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.item{padding:12px;border:none;border-radius:12px;cursor:pointer;background:#020617;color:white}
.item.active{background:#10b981;color:black}
.output-box{margin-top:20px;background:#020617;padding:15px;border-radius:16px}
textarea{width:100%;height:100px;margin-top:10px;border-radius:10px;padding:10px;border:none;background:#0f172a;color:white}
button.copy{margin-top:10px;padding:10px;border:none;border-radius:10px;background:#10b981}

/* 右下角清空按鈕 */
.clear-btn{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:999;
  background:#ef4444;
  color:white;
  padding:12px 16px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.2s;
}
.clear-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(239,68,68,0.8);
}
</style>
</head>
<body>
<div class="container">
<!-- 作者連結 Banner -->
<div class="banner" style="margin-bottom:16px;padding:12px;border-radius:14px;background:linear-gradient(135deg,#7c2d12,#dc2626);text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.4)">
  <a href="https://www.youtube.com/@AQiAILab" target="_blank" rel="noopener noreferrer" style="color:white;text-decoration:none;font-weight:bold;display:block">
    📺 張阿旗 AI Lab（點我訂閱🔥）
  </a>
</div>

<h1>🔥 AI Prompt Builder Pro（JSON完整版）</h1>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>


<div class="output-box">
<label>English Prompt</label>
<textarea id="outputEN"></textarea>
<button class="copy" onclick="copyEN()">📋 Copy EN</button>
<label style="margin-top:10px;display:block">中文提示詞</label>
<textarea id="outputCN"></textarea>
<button class="copy" onclick="copyCN()">📋 Copy 中文</button>
</div>
</div>

<button class="clear-btn" onclick="clearAll()">🗑 清空</button>

<script>
// 🔥 完整資料庫
const DATA = {
  style:{
    "寫實":[
      {en:"photorealistic",cn:"寫實"},
      {en:"cinematic",cn:"電影感"},
      {en:"high detail",cn:"高細節"}
    ],
    "藝術風":[
      {en:"oil painting",cn:"油畫"},
      {en:"watercolor",cn:"水彩"},
      {en:"ink wash painting",cn:"水墨"},
      {en:"sketch",cn:"素描"}
    ],
    "動漫/遊戲":[
      {en:"anime style",cn:"動漫"},
      {en:"manga style",cn:"漫畫"},
      {en:"game art",cn:"遊戲風"}
    ],
    "品牌/工作室":[
      {en:"studio ghibli style",cn:"吉卜力"},
      {en:"pixar style",cn:"皮克斯"},
      {en:"disney style",cn:"迪士尼"}
    ],
    "風格化":[
      {en:"cyberpunk",cn:"賽博朋克"},
      {en:"steampunk",cn:"蒸氣龐克"},
      {en:"fantasy style",cn:"奇幻"},
      {en:"sci-fi",cn:"科幻"}
    ],
    "美式卡通":[
      {en:"rubber hose style",cn:"橡膠管"},
      {en:"adult western cartoon style",cn:"成人卡通"}
    ]
  },

  composition:{
    "基礎":[
      {en:"rule of thirds",cn:"三分法"},
      {en:"centered composition",cn:"中心構圖"},
      {en:"symmetry",cn:"對稱"},
      {en:"diagonal composition",cn:"對角線"}
    ],
    "進階":[
      {en:"leading lines",cn:"引導線"},
      {en:"frame within a frame",cn:"框中框"},
      {en:"negative space",cn:"留白"},
      {en:"rule of odds",cn:"奇數"}
    ]
  },

  angle:{
    "基本":[
      {en:"eye level shot",cn:"平視"},
      {en:"low angle shot",cn:"仰角"},
      {en:"high angle shot",cn:"俯角"}
    ],
    "進階":[
      {en:"bird's eye view",cn:"鳥瞰"},
      {en:"worm's eye view",cn:"蟲視角"},
      {en:"dutch angle",cn:"傾斜"},
      {en:"over the shoulder shot",cn:"肩後"}
    ]
  },

  shot:{
    "遠":[
      {en:"extreme wide shot",cn:"極遠"},
      {en:"wide shot",cn:"遠景"}
    ],
    "中":[
      {en:"medium shot",cn:"中景"},
      {en:"medium close-up",cn:"中近"},
      {en:"full shot",cn:"全身"}
    ],
    "近":[
      {en:"close-up",cn:"特寫"},
      {en:"extreme close-up",cn:"極近"}
    ]
  },

  lighting:{
    "光源":[
      {en:"side lighting",cn:"側光"},
      {en:"top lighting",cn:"頂光"},
      {en:"backlighting",cn:"逆光"},
      {en:"window light",cn:"窗光"},
      {en:"neon lighting",cn:"霓虹"}
    ],
    "光質":[
      {en:"soft lighting",cn:"柔光"},
      {en:"hard lighting",cn:"硬光"},
      {en:"rim lighting",cn:"輪廓光"},
      {en:"diffused light",cn:"漫射"}
    ],
    "風格":[
      {en:"dramatic lighting",cn:"戲劇光"},
      {en:"cinematic lighting",cn:"電影光"},
      {en:"studio lighting",cn:"棚拍"}
    ]
  },

  lens:{
    "廣角":[
      {en:"14mm",cn:"14mm"},
      {en:"24mm",cn:"24mm"}
    ],
    "標準":[
      {en:"35mm",cn:"35mm"},
      {en:"50mm",cn:"50mm"}
    ],
    "長焦":[
      {en:"85mm",cn:"85mm"},
      {en:"135mm",cn:"135mm"},
      {en:"200mm",cn:"200mm"}
    ]
  },

  dof:{
    "景深":[
      {en:"shallow depth of field",cn:"淺景深"},
      {en:"deep depth of field",cn:"深景深"},
      {en:"bokeh",cn:"散景"},
      {en:"sharp focus",cn:"銳利"}
    ]
  },

  env:{
    "時間":[
      {en:"sunrise",cn:"日出"},
      {en:"noon",cn:"正午"},
      {en:"sunset",cn:"黃昏"},
      {en:"night",cn:"夜晚"},
      {en:"blue hour",cn:"藍調"}
    ],
    "天氣":[
      {en:"rain",cn:"雨"},
      {en:"snow",cn:"雪"},
      {en:"fog",cn:"霧"},
      {en:"storm",cn:"暴風"}
    ]
  },

  ratio:{
    "比例":[
      {en:"16:9",cn:"16:9"},
      {en:"9:16",cn:"9:16"},
      {en:"1:1",cn:"1:1"},
      {en:"4:3",cn:"4:3"},
      {en:"21:9",cn:"21:9"}
    ]
  },

  expression:{
    "正向":[
      {en:"smiling",cn:"微笑"},
      {en:"laughing",cn:"大笑"},
      {en:"gentle smile",cn:"溫柔"}
    ],
    "負向":[
      {en:"crying",cn:"哭泣"},
      {en:"frowning",cn:"皺眉"},
      {en:"despairing",cn:"絕望"}
    ],
    "強烈":[
      {en:"angry",cn:"憤怒"},
      {en:"shouting",cn:"咆哮"},
      {en:"smirk",cn:"輕蔑"}
    ],
    "進階":[
      {en:"evil smile",cn:"邪魅"},
      {en:"blank stare",cn:"空洞"},
      {en:"seductive eyes",cn:"誘惑"},
      {en:"determined look",cn:"堅毅"}
    ],
    "反應":[
      {en:"surprised",cn:"驚訝"},
      {en:"confused",cn:"困惑"},
      {en:"blushing",cn:"臉紅"}
    ],
    "氣質":[
      {en:"indifferent",cn:"冷淡"},
      {en:"pensive",cn:"沉思"}
    ],
    "壓制":[
      {en:"disgust",cn:"厭惡"},
      {en:"disdain",cn:"輕蔑"},
      {en:"contempt",cn:"蔑視"},
      {en:"shaded face",cn:"陰影臉"},
      {en:"jitome",cn:"鄙夷"}
    ]
  }
};

let selected=new Map();
let selectedCN=new Map();

const tabs=document.getElementById('tabs');
const panels=document.getElementById('panels');

// 中文Tab名稱對照
const TAB_NAME_MAP = {
  style: "風格",
  composition: "構圖",
  angle: "視角",
  shot: "景別",
  lighting: "光影",
  lens: "焦距",
  dof: "景深",
  env: "環境",
  ratio: "比例",
  expression: "表情"
};

Object.keys(DATA).forEach((key,i)=>{
  let tab=document.createElement('div');
  tab.className='tab'+(i==0?' active':'');
  tab.innerText = TAB_NAME_MAP[key] || key;
  tab.dataset.target=key;
  tabs.appendChild(tab);

  let panel=document.createElement('div');
  panel.className='panel'+(i==0?' active':'');
  panel.id=key;

  let groups=DATA[key];
  Object.keys(groups).forEach(groupName=>{
    let acc=document.createElement('div');
    acc.className='accordion';

    let header=document.createElement('div');
    header.className='accordion-header';
    header.innerText=groupName;

    let content=document.createElement('div');
    content.className='accordion-content';

    let grid=document.createElement('div');
    grid.className='grid';

    groups[groupName].forEach(item=>{
      let btn=document.createElement('button');
      btn.className='item';
      btn.innerText=item.cn;

      btn.onclick=()=>{
        if(selected.has(item.en)){
          selected.delete(item.en);
          selectedCN.delete(item.en);
          btn.classList.remove('active');
        }else{
          selected.set(item.en,item.en);
          selectedCN.set(item.en,item.cn);
          btn.classList.add('active');
        }

        outputEN.value=[...selected.keys()].join(', ');
        outputCN.value=[...selectedCN.values()].join('、');
      }

      grid.appendChild(btn);
    });

    header.onclick=()=>acc.classList.toggle('active');

    content.appendChild(grid);
    acc.appendChild(header);
    acc.appendChild(content);
    panel.appendChild(acc);
  });

  panels.appendChild(panel);
});

// tab切換
document.addEventListener('click',e=>{
  if(e.target.classList.contains('tab')){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById(e.target.dataset.target).classList.add('active');
  }
});

async function copyEN(){
  try{
    await navigator.clipboard.writeText(outputEN.value);
    alert('已複製 EN');
  }catch(e){
    outputEN.select();
    document.execCommand('copy');
    alert('已複製 EN（fallback）');
  }
}

async function copyCN(){
  try{
    await navigator.clipboard.writeText(outputCN.value);
    alert('已複製 中文');
  }catch(e){
    outputCN.select();
    document.execCommand('copy');
    alert('已複製 中文（fallback）');
  }
}

// 🔥 一鍵清空
function clearAll(){
  selected.clear();
  selectedCN.clear();
  document.querySelectorAll('.item').forEach(btn=>btn.classList.remove('active'));
  outputEN.value='';
  outputCN.value='';
}
</script>

</body>
</html>
